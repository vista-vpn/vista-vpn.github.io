<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VPN App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #f5f5f5; font-family: 'Inter', sans-serif; display: flex; justify-content: center; min-height: 100vh; }
        .app-container { width: 100%; max-width: 400px; padding: 40px 20px 80px 20px; }
        h1 { font-size: 28px; font-weight: 700; margin-bottom: 30px; line-height: 1.2; }
        .card { background-color: #dbdbdb; border: 2px solid #000; border-radius: 20px; padding: 20px; margin-bottom: 20px; }
        .card-title { font-size: 16px; font-weight: 600; margin-bottom: 15px; }
        .data-display { font-family: 'JetBrains Mono', monospace; font-size: 20px; }
        .key-container { background-color: #c7c7c7; padding: 10px; border-radius: 10px; font-family: 'JetBrains Mono', monospace; font-size: 12px; word-break: break-all; cursor: pointer; border: 1px solid #999; }
        
        .bottom-nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: calc(100% - 40px); max-width: 360px; background-color: #fff; border: 2px solid #000; border-radius: 30px; display: flex; justify-content: space-around; align-items: center; padding: 10px 0; }
        .nav-item { width: 44px; height: 44px; display: flex; justify-content: center; align-items: center; border-radius: 50%; cursor: pointer; }
        .nav-item.active { background-color: #d1d1d1; border: 2px solid #000; }
        .nav-item svg { width: 24px; height: 24px; stroke: #000; stroke-width: 2; fill: none; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body>

<div class="app-container">
    <h1 id="greeting">Загрузка...</h1>

    <div id="tab-home" class="tab-content active">
        <div class="card">
            <div class="card-title">До конца подписки осталось:</div>
            <div id="days-count" class="data-display">-- дней</div>
        </div>
        <div class="card">
            <div class="card-title">Ваш ключ:</div>
            <div class="key-container" onclick="copyKey()">
                <span id="vpn-key">Получение ключа...</span>
            </div>
        </div>
    </div>

    <div id="tab-link" class="tab-content">
        <div class="card"><div class="card-title">Инструкция</div><p>Скопируйте ключ и вставьте в Outline App.</p></div>
    </div>

    <div id="tab-profile" class="tab-content">
        <div class="card"><div class="card-title">Аккаунт</div><p id="user-info">ID: --</p></div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="switchTab('home', this)"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg></div>
        <div class="nav-item" onclick="switchTab('link', this)"><svg viewBox="0 0 24 24"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07"></path></svg></div>
        <div class="nav-item" onclick="switchTab('profile', this)"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path></svg></div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    // ЗАМЕНИ НА СВОЙ IP (обязательно с http:// или https://)
    const API_URL = "http://ТВОЙ_IP_СЕРВЕРА:8000"; 

    async function initApp() {
        const user = tg.initDataUnsafe.user;
        if (user) {
            document.getElementById('greeting').innerText = `Здравствуйте, ${user.first_name || 'Пользователь'}`;
            document.getElementById('user-info').innerText = `ID: ${user.id}`;
            
            try {
                const res = await fetch(`${API_URL}/get_key/${user.id}`);
                const data = await res.json();
                document.getElementById('vpn-key').innerText = data.vpn_url;
                document.getElementById('days-count').innerText = `${data.days_left} дней`;
            } catch (e) {
                document.getElementById('vpn-key').innerText = "Ошибка связи с сервером";
            }
        } else {
            document.getElementById('greeting').innerText = "Откройте в Telegram";
        }
    }

    function copyKey() {
        const text = document.getElementById('vpn-key').innerText;
        navigator.clipboard.writeText(text);
        tg.showAlert("Ключ скопирован!");
    }

    function switchTab(tabId, el) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.getElementById('tab-' + tabId).classList.add('active');
        el.classList.add('active');
    }

    initApp();
</script>
</body>
</html>
