<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VPN Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background-color: #f5f5f5; font-family: 'Inter', sans-serif; color: #000; overflow: hidden; }

        .app-container { width: 100%; height: 100vh; padding: 40px 25px; position: relative; }
        
        h1 { font-size: 32px; font-weight: 700; margin-bottom: 40px; line-height: 1.1; }

        .card { 
            background-color: #d9d9d9; 
            border: 2px solid #000; 
            border-radius: 25px; 
            padding: 25px; 
            margin-bottom: 25px; 
        }

        .card-title { font-size: 16px; font-weight: 500; margin-bottom: 20px; }
        .data-display { font-size: 28px; font-weight: 400; }

        .key-box {
            background-color: #bfbfbf;
            padding: 15px;
            border-radius: 12px;
            font-size: 13px;
            word-break: break-all;
            font-family: monospace;
            cursor: pointer;
        }

        /* Навигация как на фото */
        .nav-bar {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 70%;
            background: #fff;
            border: 2px solid #000;
            border-radius: 50px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 5px;
        }

        .nav-item {
            width: 50px;
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
            font-size: 24px;
            transition: 0.2s;
        }

        .nav-item.active {
            background-color: #d9d9d9;
            border: 2px solid #000;
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body>

<div class="app-container">
    <h1 id="user-name">Здравствуйте,<br>[Name]</h1>

    <div id="home" class="tab-content active">
        <div class="card">
            <div class="card-title">До конца подписки осталось:</div>
            <div class="data-display" id="days">... дней</div>
        </div>
        <div class="card">
            <div class="card-title">Ваш ключ:</div>
            <div class="key-box" id="key" onclick="copyKey()">Загрузка ключа...</div>
        </div>
    </div>

    <div id="settings" class="tab-content">
        <div class="card">
            <div class="card-title">Как подключить:</div>
            <p style="font-size: 14px;">Скачайте Outline, вставьте ключ и нажмите кнопку "Добавить сервер".</p>
        </div>
    </div>

    <div id="profile" class="tab-content">
        <div class="card">
            <div class="card-title">Информация:</div>
            <p id="user-id" style="font-size: 14px;">ID: ...</p>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="showTab('home', this)">🏠</div>
        <div class="nav-item" onclick="showTab('settings', this)">🔗</div>
        <div class="nav-item" onclick="showTab('profile', this)">👤</div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    // Замени на URL своего Python бэкенда
    const API_URL = "http://ТВОЙ_IP_СЕРВЕРА:8000"; 

    function showTab(tabId, el) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        el.classList.add('active');
    }

    async function loadData() {
        const user = tg.initDataUnsafe.user;
        if (user) {
            document.getElementById('user-name').innerHTML = `Здравствуйте,<br>${user.first_name}`;
            document.getElementById('user-id').innerText = `Ваш Telegram ID: ${user.id}`;

            try {
                const response = await fetch(`${API_URL}/get_key/${user.id}`);
                const data = await response.json();
                document.getElementById('key').innerText = data.vpn_url;
                document.getElementById('days').innerText = `${data.days_left} дней`;
            } catch (e) {
                document.getElementById('key').innerText = "Ошибка сервера. Проверьте запуск Python.";
            }
        }
    }

    function copyKey() {
        const key = document.getElementById('key').innerText;
        navigator.clipboard.writeText(key);
        tg.showScanQrPopup({text: "Ключ скопирован!"}); // Просто как уведомление
        setTimeout(() => tg.closeScanQrPopup(), 1000);
    }

    loadData();
</script>

</body>
</html>
