<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VPN Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            -webkit-tap-highlight-color: transparent;
            user-select: none; /* Запрещаем выделение всего интерфейса */
        }

        body { background-color: #f5f5f5; font-family: 'Inter', sans-serif; color: #000; overflow: hidden; }

        .app-container { width: 100%; height: 100vh; padding: 40px 25px; position: relative; }
        
        h1 { font-size: 32px; font-weight: 700; margin-bottom: 40px; line-height: 1.1; }

        .card { 
            background-color: #d9d9d9; 
            border: 2px solid #000; 
            border-radius: 25px; 
            padding: 25px; 
            margin-bottom: 25px; 
        }

        .card-title { font-size: 16px; font-weight: 500; margin-bottom: 20px; }
        .data-display { font-size: 28px; font-weight: 400; }

        .key-box {
            background-color: #bfbfbf;
            padding: 15px;
            border-radius: 12px;
            font-size: 13px;
            word-break: break-all;
            font-family: monospace;
            cursor: pointer;
            user-select: text; /* Разрешаем копировать только сам ключ */
        }

        /* Навигация как на фото */
        .nav-bar {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            max-width: 320px;
            background: #fff;
            border: 2px solid #000;
            border-radius: 50px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 6px;
        }

        .nav-item {
            width: 54px;
            height: 54px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
            transition: 0.2s;
            cursor: pointer;
        }

        .nav-item svg {
            width: 28px;
            height: 28px;
            stroke: #000;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .nav-item.active {
            background-color: #d9d9d9;
            border: 2px solid #000;
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body>

<div class="app-container">
    <h1 id="user-name">Здравствуйте,<br>[Name]</h1>

    <div id="home" class="tab-content active">
        <div class="card">
            <div class="card-title">До конца подписки осталось:</div>
            <div class="data-display" id="days">... дней</div>
        </div>
        <div class="card">
            <div class="card-title">Ваш ключ:</div>
            <div class="key-box" id="key" onclick="copyKey()">Загрузка ключа...</div>
        </div>
    </div>

    <div id="settings" class="tab-content">
        <div class="card">
            <div class="card-title">Как подключить:</div>
            <p style="font-size: 14px; line-height: 1.4;">1. Скопируйте ключ.<br>2. Откройте приложение Outline.<br>3. Нажмите "Добавить сервер".</p>
        </div>
    </div>

    <div id="profile" class="tab-content">
        <div class="card">
            <div class="card-title">Аккаунт:</div>
            <p id="user-id" style="font-size: 14px;">Telegram ID: ...</p>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="showTab('home', this)">
            <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
        </div>
        <div class="nav-item" onclick="showTab('settings', this)">
            <svg viewBox="0 0 24 24"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>
        </div>
        <div class="nav-item" onclick="showTab('profile', this)">
            <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
        </div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    // ЗАМЕНИ НА СВОЙ IP!
    const API_URL = "http://ТВОЙ_IP_СЕРВЕРА:8000"; 

    function showTab(tabId, el) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        el.classList.add('active');
        
        // Вибрация при нажатии (только в мобильном TG)
        tg.HapticFeedback.impactOccurred('light');
    }

    async function loadData() {
        const user = tg.initDataUnsafe.user;
        if (user) {
            document.getElementById('user-name').innerHTML = `Здравствуйте,<br>${user.first_name}`;
            document.getElementById('user-id').innerText = `ID: ${user.id}`;

            try {
                const response = await fetch(`${API_URL}/get_key/${user.id}`);
                const data = await response.json();
                document.getElementById('key').innerText = data.vpn_url;
                document.getElementById('days').innerText = `${data.days_left} дней`;
            } catch (e) {
                document.getElementById('key').innerText = "Ошибка: Запустите main.py на сервере";
            }
        }
    }

    function copyKey() {
        const keyText = document.getElementById('key').innerText;
        const el = document.createElement('textarea');
        el.value = keyText;
        document.body.appendChild(el);
        el.select();
        document.execCommand('copy');
        document.body.removeChild(el);
        
        tg.showAlert("Ключ успешно скопирован!");
    }

    loadData();
</script>

</body>
</html>
