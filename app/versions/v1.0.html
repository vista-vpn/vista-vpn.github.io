<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Обновление приложения</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 32px;
            color: #1a1a1a;
        }

        .current-version {
            margin-bottom: 16px;
            font-size: 1rem;
            color: #555;
        }

        .current-version span {
            font-weight: 700;
            font-size: 1.3rem;
            color: #000;
            background: #f0f0f0;
            padding: 4px 12px;
            border-radius: 20px;
            display: inline-block;
            margin-left: 8px;
        }

        .latest-version {
            margin-bottom: 32px;
            font-size: 1rem;
            color: #555;
        }

        .latest-version span {
            font-weight: 700;
            font-size: 1.3rem;
            color: #000;
            background: #f0f0f0;
            padding: 4px 12px;
            border-radius: 20px;
            display: inline-block;
            margin-left: 8px;
        }

        .download-btn {
            background: #007aff;
            border: none;
            padding: 12px 32px;
            font-size: 1rem;
            font-weight: 600;
            font-family: inherit;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            width: 100%;
            max-width: 200px;
        }

        .download-btn:hover {
            background: #005fc1;
        }

        .download-btn.highlight {
            background: #ff3b30;
            animation: pulse 0.6s ease-in-out 2;
        }

        .download-btn.highlight:hover {
            background: #e6352a;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.02);
            }
            100% {
                transform: scale(1);
            }
        }

        .status {
            margin-top: 24px;
            font-size: 0.85rem;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Обновление приложения</h1>

        <div class="current-version">
            📱 Установленная версия: <span id="currentVersion">v1.0</span>
        </div>

        <div class="latest-version">
            🌐 Последняя версия: <span id="latestVersion">v1.1</span>
        </div>

        <button class="download-btn" id="downloadBtn">
            ⬇️ Скачать
        </button>

        <div class="status" id="statusMsg"></div>
    </div>

    <script>
        // =============================================
        // ★ ГЛАВНЫЕ ПЕРЕМЕННЫЕ - МЕНЯЙ ИХ ЗДЕСЬ ★
        // =============================================
        
        // Текущая установленная версия (меняй вручную)
        let currentVersion = "v1.0";
        
        // Последняя доступная версия (меняй вручную)
        let latestVersion = "v1.0";
        
        // Прямая ссылка на APK файл (реальное скачивание)
        const APK_DOWNLOAD_URL = "url_soon";
        
        // =============================================
        // Код ниже обновляет интерфейс и обрабатывает скачивание
        // =============================================
        
        const currentVersionSpan = document.getElementById("currentVersion");
        const latestVersionSpan = document.getElementById("latestVersion");
        const downloadBtn = document.getElementById("downloadBtn");
        const statusMsg = document.getElementById("statusMsg");
        
        function updateUI() {
            // Отображаем версии
            currentVersionSpan.textContent = currentVersion;
            latestVersionSpan.textContent = latestVersion;
            
            // Проверяем, нужно ли обновление
            const needUpdate = (currentVersion !== latestVersion);
            
            if (needUpdate) {
                downloadBtn.classList.add("highlight");
                statusMsg.textContent = "Доступна новая версия! Нажмите для скачивания";
                statusMsg.style.color = "#ff3b30";
            } else {
                downloadBtn.classList.remove("highlight");
                statusMsg.textContent = "У вас актуальная версия";
                statusMsg.style.color = "#34c759";
            }
        }
        
        // Функция реального скачивания APK
        function downloadApk() {
            // Создаём невидимую ссылку для скачивания
            const link = document.createElement('a');
            link.href = APK_DOWNLOAD_URL;
            link.download = 'com.kst.v.apk'; // предлагаемое имя файла
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
        
        // Обработчик кнопки
        downloadBtn.addEventListener("click", () => {
            const needUpdate = (currentVersion !== latestVersion);
            
            if (needUpdate) {
                // Реальное скачивание APK
                try {
                    downloadApk();
                    statusMsg.textContent = `Скачивание ${latestVersion} началось...`;
                    statusMsg.style.color = "#007aff";
                } catch (error) {
                    // Если не сработало через download, открываем в новой вкладке
                    window.open(APK_DOWNLOAD_URL, '_blank');
                    statusMsg.textContent = `📥 Скачивание ${latestVersion}`;
                    statusMsg.style.color = "#007aff";
                }
            } else {
                statusMsg.textContent = "У вас уже последняя версия";
                statusMsg.style.color = "#ff3b30";
                setTimeout(() => {
                    if (currentVersion === latestVersion) {
                        statusMsg.textContent = "У вас актуальная версия";
                        statusMsg.style.color = "#34c759";
                    }
                }, 2000);
            }
        });
        
        // Первоначальный запуск
        updateUI();
        
        // Чтобы ты мог менять переменные прямо из консоли браузера (для удобства)
        console.log("🔧 Для смены версий используй:");
        console.log("  currentVersion = 'v1.0'  (или любую другую)");
        console.log("  latestVersion = 'v1.2'");
        console.log("  updateUI() — обновить интерфейс");
        console.log("");
        console.log("APK скачивается с: " + APK_DOWNLOAD_URL);
        console.log("Пример: currentVersion = 'v1.0'; latestVersion = 'v1.5'; updateUI();");
    </script>
</body>
</html>
